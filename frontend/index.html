<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const token = localStorage.getItem("token");
            if (token) {
                window.location.replace("dashboard.html");
            }
        });
    </script>
</head>

<body class="bg-warning-subtle">

<div class="container vh-100 d-flex justify-content-center align-items-center">

    <div class="card border-0 shadow-lg rounded-4 w-100" style="max-width: 380px;">

        
        <div class="card-header bg-warning text-dark text-center fw-bold fs-4 rounded-top-4">
             Login
        </div>

        <div class="card-body p-4">

           
            <div class="mb-2">
                <label class="form-label fw-semibold">Username</label>
                <input id="username" class="form-control" placeholder="Enter username">
                <small class="text-danger" id="userError"></small>
            </div>

            
            <div class="mb-2">
                <label class="form-label fw-semibold">Password</label>

                <div class="input-group">
                    <input id="password" type="password" class="form-control" placeholder="Enter password">

                    <button class="btn btn-outline-warning" type="button" onclick="togglePassword()">
                        <i class="bi bi-eye-slash" id="eyeIcon"></i>
                    </button>
                </div>

                <small class="text-danger" id="passError"></small>
            </div>

            
            <button id="loginBtn"
                    class="btn btn-warning w-100 fw-bold mt-3 shadow-sm"
                    onclick="login()">
                Login
            </button>

            
            <p class="text-danger text-center mt-2 mb-0" id="error"></p>

        </div>

        <div class="card-footer text-center small text-muted bg-light rounded-bottom-4">
            Secure Employee System
        </div>

    </div>

</div>

<script src="js/auth.js"></script>

</body>
</html>
