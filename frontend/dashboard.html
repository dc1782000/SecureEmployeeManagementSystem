<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
<div id="navbar-container"></div>


<div class="container mt-5">

    <div class="row text-center g-4">

       
        <div class="col-md-4">
            <div class="card shadow-lg border-0 rounded-4 p-4 dashboard-card">
                
                <div class="circle bg-primary text-white">
                    <span id="totalEmp">0</span>
                </div>

                <h5 class="mt-3 fw-bold">Total Employees</h5>
                <p class="text-muted mb-0">All registered employees</p>
            </div>
        </div>

        
        <div class="col-md-4">
            <div class="card shadow-lg border-0 rounded-4 p-4 dashboard-card">

                <div class="circle bg-success text-white">
                    <span id="activeEmp">0</span>
                </div>

                <h5 class="mt-3 fw-bold">Active Employees</h5>
                <p class="text-muted mb-0">Currently working</p>
            </div>
        </div>

       
        <div class="col-md-4">
            <div class="card shadow-lg border-0 rounded-4 p-4 dashboard-card">

                <div class="circle bg-danger text-white">
                    <span id="inactiveEmp">0</span>
                </div>

                <h5 class="mt-3 fw-bold">Inactive Employees</h5>
                <p class="text-muted mb-0">Not active users</p>
            </div>
        </div>

    </div>
</div>

<script src="js/authGuard.js"></script>

<script src="js/navbar.js"></script>

<script src="js/dashboard.js"></script>

<script>

    loadNavbar();

</script>
</body>
</html>
